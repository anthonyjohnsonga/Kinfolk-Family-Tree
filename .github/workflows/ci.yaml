name: Continuous integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://kinfolk:test@localhost:5432/kinfolk
      POSTGRES_PASSWORD: ci_only_password
      KINFOLK_VERSION: ci
      KINFOLK_ROOT_PATH: /tmp/kinfolk
      KINFOLK_NFS_ADDR: 192.0.2.10
      KINFOLK_NFS_EXPORT: /exports/kinfolk-backups
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm exec --workspace @kinfolk/api prisma validate

      - name: Check code formatting
        run: npm run format:check

      - name: Run strict TypeScript checks
        run: npm run typecheck

      - name: Build production applications
        run: npm run build

      - name: Validate base Compose configuration
        run: docker compose config --quiet

      - name: Validate production Compose configuration
        run: docker compose -f compose.production.yaml config --quiet

      - name: Validate bind-storage and backup Compose layers
        run: docker compose -f compose.yaml -f compose.storage-bind.yaml -f compose.backup.yaml config --quiet

      - name: Validate NFS backup Compose layer
        run: docker compose -f compose.yaml -f compose.backup.yaml -f compose.backup-nfs.yaml config --quiet

  containers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: Dockerfile
            target: runtime
          - name: api
            dockerfile: Dockerfile.api
            target: runtime
          - name: migrate
            dockerfile: Dockerfile.api
            target: migrate
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          tags: kinfolk-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
