name: Publish release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: Dockerfile
          - name: api
            dockerfile: Dockerfile.api
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kinfolk-family-tree-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and publish ${{ matrix.name }} image
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/kinfolk-family-tree-${{ matrix.name }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

  github-release:
    needs: publish-images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          args=("$TAG" --verify-tag --generate-notes --title "Kinfolk $TAG")
          if [[ "$TAG" == *-* ]]; then args+=(--prerelease); fi
          gh release create "${args[@]}"
