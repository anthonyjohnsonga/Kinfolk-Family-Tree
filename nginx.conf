upstream kinfolk_api { server api:3000; }
server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 10m;
    location /api/ { proxy_pass http://kinfolk_api; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /health { proxy_pass http://kinfolk_api/health; }
    location / { try_files $uri $uri/ /index.html; }
    location ~* \.(?:css|js)$ { expires 1h; add_header Cache-Control "public, max-age=3600"; try_files $uri =404; }
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
